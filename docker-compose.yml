  mysql:
    image: mysql:5.7
    container_name: mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpressdb
      MYSQL_USER: wpuser
      MYSQL_PASSWORD: wppassword

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - wp_network

volumes:
  mysql_data:


networks:
  wp_network:
    driver: bridge